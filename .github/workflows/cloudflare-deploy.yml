name: Cloudflare Workers 部署

# ============================================================================
# 职责：Cloudflare Workers 部署 + MISSING_MESSAGE 检测 + 健康检查
# 触发：手动触发（workflow_dispatch）
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: 构建并部署到 Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 检查 Cloudflare 凭据
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ Cloudflare secrets 未配置"
            echo "需要: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          echo "✅ Cloudflare 凭据已配置"

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false
          standalone: true

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "pnpm"

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: 运行环境对应的证明链
        run: |
          set -euo pipefail
          if [ "${{ inputs.environment }}" = "preview" ]; then
            pnpm preview:preflight:cf
          else
            pnpm release:verify
          fi
        env:
          CI: true
          NODE_ENV: production
          # Preview deployments: allow degraded mode for services not yet configured
          ALLOW_MEMORY_RATE_LIMIT: ${{ inputs.environment == 'preview' && 'true' || '' }}
          ALLOW_MEMORY_IDEMPOTENCY: ${{ inputs.environment == 'preview' && 'true' || '' }}
          RATE_LIMIT_PEPPER: ${{ secrets.RATE_LIMIT_PEPPER || (inputs.environment == 'preview' && 'preview-placeholder-pepper-value-32ch' || '') }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY || (inputs.environment == 'preview' && 'preview-placeholder-key-0123456789ab' || '') }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY || (inputs.environment == 'preview' && '1x0000000000000000000000000000000AA' || '') }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY || (inputs.environment == 'preview' && '1x00000000000000000000AA' || '') }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || (inputs.environment == 'preview' && 're_preview_placeholder' || '') }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY || (inputs.environment == 'preview' && 'pat_preview_placeholder' || '') }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID || (inputs.environment == 'preview' && 'app_preview_placeholder' || '') }}

      - name: 构建（Cloudflare Workers）
        id: build
        run: |
          set -euo pipefail
          pnpm build:cf 2>&1 | tee cf_build.log
          echo "log-path=$(pwd)/cf_build.log" >> "$GITHUB_OUTPUT"
        env:
          CI: true
          NODE_ENV: production
          # Preview deployments: same degraded overrides as the verify step (prebuild re-runs validate:config)
          ALLOW_MEMORY_RATE_LIMIT: ${{ inputs.environment == 'preview' && 'true' || '' }}
          ALLOW_MEMORY_IDEMPOTENCY: ${{ inputs.environment == 'preview' && 'true' || '' }}
          RATE_LIMIT_PEPPER: ${{ secrets.RATE_LIMIT_PEPPER || (inputs.environment == 'preview' && 'preview-placeholder-pepper-value-32ch' || '') }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY || (inputs.environment == 'preview' && 'preview-placeholder-key-0123456789ab' || '') }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY || (inputs.environment == 'preview' && '1x0000000000000000000000000000000AA' || '') }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY || (inputs.environment == 'preview' && '1x00000000000000000000AA' || '') }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || (inputs.environment == 'preview' && 're_preview_placeholder' || '') }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY || (inputs.environment == 'preview' && 'pat_preview_placeholder' || '') }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID || (inputs.environment == 'preview' && 'app_preview_placeholder' || '') }}

      - name: 阻断：检测 next-intl MISSING_MESSAGE
        run: |
          set -euo pipefail
          if grep -E -i "MISSING_MESSAGE" cf_build.log; then
            echo "❌ Detected next-intl MISSING_MESSAGE in build logs"
            exit 1
          else
            echo "✅ No MISSING_MESSAGE found"
          fi

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cf-build-log-${{ inputs.environment }}
          path: cf_build.log
          if-no-files-found: ignore

      - name: 部署到 Cloudflare Workers
        id: deploy
        run: |
          set -euo pipefail
          DEPLOY_OUTPUT=$(pnpm exec opennextjs-cloudflare deploy --env ${{ inputs.environment }} 2>&1) || {
            echo "❌ 部署失败"
            echo "$DEPLOY_OUTPUT"
            exit 1
          }
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1 || echo "")
          if [ -z "$DEPLOY_URL" ]; then
            if [ "${{ inputs.environment }}" = "production" ]; then
              DEPLOY_URL="https://tianze-pipe.com"
            else
              DEPLOY_URL="https://preview.tianze-pipe.com"
            fi
            echo "⚠️ 未从部署输出中提取到 URL，使用环境固定 URL: $DEPLOY_URL"
          fi
          echo "deployment-url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ 部署成功"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_ENV: production

      - name: 部署总结
        run: |
          echo "## ☁️ Cloudflare Workers 部署总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **环境**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.deploy.outputs.deployment-url }}" ]; then
            echo "- **部署 URL**: ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          fi

  post-deploy-verification:
    name: 部署后验证
    runs-on: ubuntu-latest
    needs: build-and-deploy
    timeout-minutes: 10
    if: needs.build-and-deploy.outputs.deployment_url != ''

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 等待部署就绪
        run: |
          set -euo pipefail
          url="${{ needs.build-and-deploy.outputs.deployment_url }}"
          echo "等待部署就绪: $url"

          max_tries=30
          delay=5

          for i in $(seq 1 $max_tries); do
            status=$(curl -s -o /dev/null -w "%{http_code}" -I "$url" || echo "000")
            if [ "$status" = "000" ]; then
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            fi

            echo "第 $i 次探测: $status"
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "部署已就绪"
              exit 0
            fi

            if [ $((i % 10)) -eq 0 ] && [ "$delay" -lt 15 ]; then
              delay=$((delay + 5))
            fi
            sleep "$delay"
          done
          echo "等待超时" >&2
          exit 1

      - name: 健康检查
        run: |
          set -euo pipefail
          echo "Cloudflare deployed proof: running final post-deploy smoke against the deployed URL"
          if [ ! -f ./scripts/deploy/post-deploy-smoke.mjs ]; then
            echo "❌ Missing ./scripts/deploy/post-deploy-smoke.mjs in workflow checkout" >&2
            ls -la ./scripts || true
            ls -la ./scripts/deploy || true
            exit 1
          fi
          node ./scripts/deploy/post-deploy-smoke.mjs --base-url "${{ needs.build-and-deploy.outputs.deployment_url }}"
